
name: Deploy to Server


on:
    workflow_call:

jobs:
    deploy:
        runs-on: ubuntu-latest
        env:
            DOCKERHUB_USER : ${{ vars.DOCKERHUB_USER }}
            DOCKER_TAG: ${{github.event.workflow_run.head_sha}}        
        steps:

            - name: Code Checkout
              uses: actions/checkout@v4

            - name: SSH to Prod Server
              uses: appleboy/ssh-action@v1.0.3
              with:
                host: ${{ secrets.EC2_SSH_HOST }}
                username: ${{ secrets.EC2_SSH_USER }}
                key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
                script: |
                 echo: "Starting Deployment"
                 mkdir -p devops       

            - name: SSH to Prod server & Inhstalling packages
              uses:  appleboy/ssh-action@v1.0.3
              with:
                host: ${{ secrets.EC2_SSH_HOST }}
                username: ${{ secrets.EC2_SSH_USER }}
                key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
                script: |
                    sudo apt-get update && sudo apt-get install docker.io docker-compose-v2 -y
                    sudo usermod -aG docker $USER && newgrp docker     
                    
                    
            - name: Copy Docker Compose file
              uses: appleboy/scp-action@v1
              with:
                host: ${{ secrets.EC2_SSH_HOST }}
                username: ${{ secrets.EC2_SSH_USER }}
                key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
                source: docker-compose.yml
                target: ~/devops  

            - name: SSH to Prod server & run the app
              uses:  appleboy/ssh-action@v1.0.3
              with:
                host: ${{ secrets.EC2_SSH_HOST }}
                username: ${{ secrets.EC2_SSH_USER }}
                key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
                script: |
                    echo: "Running App"
                    export DOCKERHUB_USER=${{vars.DOCKERHUB_USER}}
                    export DOCKER_TAG=${{github.event.workflow_run.head_sha}}
                    export DOCKER_TAG=${{github.sha}}
                    echo ${{github.sha}}
                    echo ${{ secrets.DOCKERHUB_TOKEN }} | docker login -u ${{ vars.DOCKERHUB_USER}} --password-stdin
                    cd ~/devops && docker compose down && docker compose up -d --build --force-recreate --pull always  