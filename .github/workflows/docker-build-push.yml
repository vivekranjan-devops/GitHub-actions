name: Docker build & push

on:
    push:
        branches: [main]

    jobs:
        build-and-push:
            runs-on: ubuntu-latest
        
        steps:

            - name: Code Checkout
              uses: actions/checkout@v4
            
             
            - name: Login to DockerHub
              uses: docker/login-action@v4
              with:
                username:${{vars.DOCKERHUB_USER}}
                password:${{secrets.DOCKERHUB_TOKEN}}
            
            - name: Build & push to dockerhub
              uses: docekr/build-push-action@v6
              with:
                context: .
                push: true
                tags: |
                    ${{vars.DOCKERHUB_USER}}/githun-actions-app:${{githu.ref}}
                    ${{vars.DOCKERHUB_USER}}/githun-actions-app:latest
                    ${{vars.DOCKERHUB_USER}}/githun-actions-app:${{github.sha}} 