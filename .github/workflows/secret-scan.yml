name: Seceret Scan

on:
  workflow_call:

jobs:
    secret-scan:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4
              with:
                fetch-depth: 0
            
            - name: Run GitLeaks Scanner
              uses: gitleaks/gitleaks-actions@v4
              env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    